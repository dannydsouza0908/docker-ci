---
name: 10 Build and Smoke Test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-image:
    name: Build Images
    runs-on: ubuntu-latest

    permissions:
      packages: write # needed to push docker image to ghcr.io

    steps:
      - name: Set up QEMU # Build images to support multi-platforms
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx # Extend image building capabilities
        uses: docker/setup-buildx-action@v4 

      - name: Login to Docker Hub # Login to DockerHub
        uses: docker/login-action@v4 
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

#NEW: (START) ############################################################
      - name: Login to ghcr.io registry # GitHub Container Registry
        uses: docker/login-action@v4 
        with:
          registry: ghcr.io # Login to GHCR registry
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and Push to GHCR
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: ghcr.io/dannydsouza0908/docker-ci:${{ github.run_id }} # ghcr.io/<Namespace>/<IMAGE>:<TAG>
          target: test # Builds only the test stage of your Dockerfile
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Create a temporary Kubernetes- k3d cluster 
        uses: AbsaOSS/k3d-action@v2.4.0
        with: # Pass below configuration
          cluster-name: "test-cluster-1" # sets the name of the Kubernetes cluster that k3d will create
          args: >-
            --agents 1
            --no-lb
            --k3s-arg "--no-deploy=traefik,servicelb,metrics-server@server:*"
        # Add 1 server and 1 agent, no k3d loadbalancer/ingress needed
        # k3s: No k3s LB needed (traefik), and disable metrics‑server on all server nodes

      - name: Smoke test deployment in k3d Kubernetes
        run: |
          kubectl create secret docker-registry regcred \
            --docker-server=https://ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }}
          export TESTING_IMAGE=ghcr.io/dannydsouza0908/docker-ci:"$GITHUB_RUN_ID"
          envsubst < manifest/deployment.yaml  | kubectl apply -f -
          kubectl rollout status deployment myapp
          kubectl exec deploy/myapp -- curl --fail localhost
#NEW: (END) ############################################################  

      - name: Docker Metadata for Final Image Build
        id: docker_meta
        uses: docker/metadata-action@v6
        with:
          images: danny0908/docker-ci # sets the base image name
          flavor: |
            latest=false
          # disable automatic latest tagging
          tags: |
            type=raw,value=10
          # comment these out on all but 04-add-metadata.yaml to avoid overwriting image tags
          # type=raw,value=latest,enable=${{ endsWith(github.ref, github.event.repository.default_branch) }}
          # type=ref,event=pr
          # type=ref,event=branch
          # type=semver,pattern={{version}}
      
      - name: Docker Build and Push to Docker Hub
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # comma seperated list of what OS and architechtures to build for (in parallel)
          # default is linux/amd64 (the OS of the runner) but you can add more
          # adding linux/arm64 is recommended for Apple Silicon, Raspberry Pi, AWS Graviton, etc.
          # linux/arm/v7 is for 32-bit ARM devices like Raspberry Pi 2/3
          platforms: linux/amd64,linux/arm64,linux/arm/v7
