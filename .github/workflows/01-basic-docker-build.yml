---
name: 01 Basic Docker Build
# simplest workflow possible

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-image:
    name: Build Image
    runs-on: ubuntu-latest
    steps:
    # 2 steps: 1. Login, 2. Build    
      - name: Login to Docker Hub
        uses: docker/login-action@v4 
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      
      - name: Docker build 
        uses: docker/build-push-action@v7
        with:
          push: ${{ github.event_name != 'pull_request' }} # Do not push on pull_request, only push and workflow_dispatch (manual)
          tags: danny0908/docker-ci:latest,danny0908/docker-ci:01 # Tag this build on dockerhub
