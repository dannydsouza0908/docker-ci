---
name: 05 Build and Comment

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-image:
    name: Build Image
    runs-on: ubuntu-latest

#NEW: (START) ##########################################################
    permissions:
      contents: read
      pull-requests: write # needed to create and update comments in PRs
#NEW: (END) ############################################################

    steps:
      - name: Set up QEMU # Build images to support multi-platforms
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx # Extend image building capabilities
        uses: docker/setup-buildx-action@v4 

      - name: Login to Docker Hub # Login to DockerHub
        uses: docker/login-action@v4 
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Docker meta
        id: docker_meta
        uses: docker/metadata-action@v6 
        with:
          images: danny0908/docker-ci # sets the base image name
          flavor: |
            latest=false  
          # disable automatic latest tagging
          tags: |
            type=raw,value=05
            type=raw,value=latest,enable=${{ endsWith(github.ref, github.event.repository.default_branch) }}
            type=ref,event=pr
            type=ref,event=branch
            type=semver,pattern={{version}}
          # raw, ref, and semver are three different tag‑generation strategies used by docker/metadata-action. 
          # They tell the action where to get the tag value from: a literal string, a Git reference, or a semantic version.
      
      - name: Docker build # Build Image
        uses: docker/build-push-action@v7
        with:
          secrets: "github_token=${{ secrets.GITHUB_TOKEN }}"
          push: false # false for this demo to prevent overwriting image tags of other examples. 
          # Your workflow will build the Docker image, but it will NOT push it to Docker Hub.
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          cache-from: type=gha # import previously saved layers from GitHub Actions cache
          cache-to: type=gha,mode=max # export new/updated layers back to GitHub Actions cache
          # type=gha selects the GitHub Actions cache backend
          # mode=max exports all intermediate layers, not just the minimal set.
          
          platforms: linux/amd64,linux/arm64,linux/arm/v7 # Add support for AMD/Intel/ARM for linux. For windows containers: windows/amd64

#NEW: (START) ##########################################################
        # Find and return comment ID
      - name: Find comment for image tags
        uses: peter-evans/find-comment@v4
        if: github.event_name == 'pull_request' # If event_name is equal to PR, run below block
        id: fc # Give this step a name (fc) so you can reference its outputs later.
        with:
          issue-number: ${{ github.event.pull_request.number }} # Get the PR number
          comment-author: 'github-actions[bot]' # Only match comments written by the GitHub Actions bot
          body-includes: Docker image tag(s) pushed # Only match comments that contain this text.
        # If the event is a PR, run this step. Give it the ID fc.
        # It will search the PR for a comment written by github-actions[bot] whose body contains "Docker image tag(s) pushed".
        # If found, it returns the comment ID of that comment (steps.<id>.outputs.comment-id)

        # This step updates (or creates) a single PR comment with the latest Docker image tags and labels. 
        # It uses the result from the previous find-comment step to decide whether to update an existing comment or create a new one.
      - name: Create or update comment for image tags
        uses: peter-evans/create-or-update-comment@v5
        if: github.event_name == 'pull_request' # Run only on PR
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }} # If find-comment found a matching comment → this contains the comment ID, If not -> Its empty. This is how the action knows whether to update or create.
          issue-number: ${{ github.event.pull_request.number }} # Specifies which PR to comment on
          body: |
            Docker image tag(s) pushed:
            ```text
            ${{ steps.docker_meta.outputs.tags }}
            ```

            Labels added to images:
            ```text
            ${{ steps.docker_meta.outputs.labels }}
            ```
          # Comment include the Tags and Labels added to the image
          edit-mode: replace # (options: append/replace) This will replace the body of the comment 
#NEW: (END) ############################################################
