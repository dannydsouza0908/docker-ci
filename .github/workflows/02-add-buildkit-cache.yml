---
name: 02 Build with BuildKit Cache

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-image:
    name: Build Image
    runs-on: ubuntu-latest
    steps:

#NEW: (START) ##########################################################
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4 
#NEW: (END) ############################################################

      - name: Login to Docker Hub
        uses: docker/login-action@v4 
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Docker build 
        uses: docker/build-push-action@v7
        with:
          push: ${{ github.event_name != 'pull_request' }} # Do not push on pull_request, only push and workflow_dispatch (manual)
          tags: danny0908/docker-ci:02 # Tag this build on dockerhub
#NEW: (START) ##########################################################
          cache-from: type=gha # import previously saved layers from GitHub Actions cache
          cache-to: type=gha,mode=max # export new/updated layers back to GitHub Actions cache
          # type=gha selects the GitHub Actions cache backend
          # mode=max exports all intermediate layers, not just the minimal set.
#NEW: (END) ############################################################
