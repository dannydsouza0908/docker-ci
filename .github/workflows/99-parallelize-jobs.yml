---
name: 99 Parallelize Jobs

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
# FIRST JOB #######################################################################   
  build-test-image:
    name: Build Image for Testing
    runs-on: ubuntu-latest

    permissions:
      packages: write # needed to push docker image to ghcr.io

    steps:
      - name: Set up Docker Buildx # Extend image building capabilities
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub # Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to ghcr.io registry # GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io # Login to GHCR registry
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and Push to GHCR 
        uses: docker/build-push-action@v7 
        with:
          push: true
          tags: ghcr.io/dannydsouza0908/docker-ci:${{ github.run_id }} # ghcr.io/<Namespace>/<IMAGE>:<TAG>
          target: test # Builds only the test stage of your Dockerfile
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
    
 # NEXT JOB #######################################################################   
  test-unit:
    name: Unit tests in Docker - GHCR registry
    needs: [build-test-image] # this job cannot start until the job named build-test-image has finished successfully.
    runs-on: ubuntu-latest

    permissions:
      packages: read
      
    steps:      
      - name: Login to ghcr.io registry
        uses: docker/login-action@v4 
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      # for simple tests (npm test, etc.) just run a local image in docker. In this case we are just doing an echo command
      - name: Unit Testing in Docker - GHCR
        run: docker run --rm ghcr.io/dannydsouza0908/docker-ci:"$GITHUB_RUN_ID" echo "run test commands here"

# NEXT JOB #######################################################################   
  test-integration:
    name: Integration tests in Compose
    needs: [build-test-image] # this job cannot start until the job named build-test-image has finished successfully.
    runs-on: ubuntu-latest

    permissions:
      packages: read

    steps:

      - name: Checkout GHCR repo # This is required by GHCR to fetch the docker-compose.test.yml file
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Login to ghcr.io registry
        uses: docker/login-action@v4 
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Test healthcheck in Docker Compose
        run: |
          export TESTING_IMAGE=ghcr.io/dannydsouza0908/docker-ci:"$GITHUB_RUN_ID"
          echo Testing image: "$TESTING_IMAGE"
          docker compose -f docker-compose.test.yml up --exit-code-from sut

# NEXT JOB #######################################################################   
  test-k3d:
    name: Test Deployment in Kubernetes
    needs: [build-test-image] # this job cannot start until the job named build-test-image has finished successfully.
    runs-on: ubuntu-latest

    permissions:
      packages: read

    steps:
      - name: Checkout git repo
        uses: actions/checkout@v6

      - name: Login to Docker Hub # Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Login to ghcr.io registry # GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io # Login to GHCR registry
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create a temporary Kubernetes- k3d cluster
        uses: AbsaOSS/k3d-action@v2.4.0
        with:
          cluster-name: "test-cluster-1"
          args: >-
            --agents 1
            --no-lb
            --k3s-arg "--no-deploy=traefik,servicelb,metrics-server@server:*"
        # Add 1 server and 1 agent, no k3d loadbalancer/ingress needed
        # k3s: No k3s LB needed (traefik), and disable metrics‑server on all server nodes
      
      - name: Smoke test deployment in k3d Kubernetes
        run: |
          kubectl create secret docker-registry regcred \
            --docker-server=https://ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }}
          export TESTING_IMAGE=ghcr.io/dannydsouza0908/docker-ci:"$GITHUB_RUN_ID"
          envsubst < manifest/deployment.yaml  | kubectl apply -f -
          kubectl rollout status deployment myapp
          kubectl exec deploy/myapp -- curl --fail localhost

# NEXT JOB #######################################################################   
  scan-image:
    name: Scan Image with Trivy - CVE Scan
    needs: [build-test-image] # this job cannot start until the job named build-test-image has finished successfully.
    runs-on: ubuntu-latest

    permissions:
      contents: read # for actions/checkout to fetch code
      packages: read # needed to pull docker image to ghcr.io
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results

    steps:
      - name: Checkout git repo
        uses: actions/checkout@v6
      
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Login to ghcr.io registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image from GHCR repo to scan
        run: docker pull ghcr.io/dannydsouza0908/docker-ci:"$GITHUB_RUN_ID"
        
      - name: Run Trivy for all CVEs (non-blocking)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/dannydsouza0908/docker-ci:${{ github.run_id }}
          format: table # Forces Trivy to always exit with code 0, even if it finds HIGH or CRITICAL CVEs. This makes the scan non-blocking so your CI pipeline continues.
          exit-code: 0 # Sets the output format to a human readable table

      # NOTE: disabled to avoid running twice and overwriting 07-add-cve-scanning-adv.yml output file (trivy-results.sarif) 
      # - name: Run Trivy for HIGH,CRITICAL CVEs and report (blocking)
      #   uses: aquasecurity/trivy-action@master
      #   with:
      #     image-ref: ghcr.io/dannydsouza0908/docker-ci:${{ github.run_id }}
      #     exit-code: 1
      #     ignore-unfixed: true
      #     vuln-type: 'os,library'
      #     severity: 'HIGH,CRITICAL'
      #     format: 'sarif'
      #     output: 'trivy-results.sarif'
      
      # - name: Upload Trivy scan results to GitHub Security tab
      #   uses: github/codeql-action/upload-sarif@v3
      #   if: always()
      #   with:
      #     sarif_file: 'trivy-results.sarif'

      # It happens because GitHub Actions treats files with the same job names, step names, or output artifacts as part of the same workflow namespace, even if they are in different YAML files.
      # So we commented out that block to avoid duplicate step names, duplicate SARIF outputs, and conflicting Trivy runs that would override the results produced by 07-add-cve-scanning-adv.yml.

# NEXT JOB #######################################################################   
  build-final-image:
    name: Build Final Image
    needs: [test-unit, test-integration, test-k3d, scan-image] # This job wont start until all the above are completed
    runs-on: ubuntu-latest

    permissions:
      packages: write # needed to push docker image to ghcr.io
      pull-requests: write # needed to create and update comments in PRs

    steps:

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4 

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4 

      - name: Login to Docker Hub
        uses: docker/login-action@v4 
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to ghcr.io registry
        uses: docker/login-action@v4 
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Metadata for Final Image Build on dockerhub and ghcr
        id: docker_meta
        uses: docker/metadata-action@v6 
        with:
          images: danny0908/docker-ci,ghcr.io/dannydsouza0908/docker-ci # This will push for both dockerhub and ghcr
          flavor: |
            latest=false
          tags: |
            type=raw,value=99
          # comment these out on all but 04-add-metadata.yaml to avoid overwriting image tags
          # type=raw,value=latest,enable=${{ endsWith(github.ref, github.event.repository.default_branch) }}
          # type=ref,event=pr
          # type=ref,event=branch
          # type=semver,pattern={{version}}
      
      - name: Docker Build and Push to GHCR and Docker Hub
        uses: docker/build-push-action@v7 
        with:
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # comma seperated list of what OS and architechtures to build for (in parallel)
          # default is linux/amd64 (the OS of the runner) but you can add more
          # adding linux/arm64 is recommended for Apple Silicon, Raspberry Pi, AWS Graviton, etc.
          # linux/arm/v7 is for 32-bit ARM devices like Raspberry Pi 2/3
          platforms: linux/amd64,linux/arm64,linux/arm/v7

        # If PR, put image tags in the PR comments
        # from https://github.com/marketplace/actions/create-or-update-comment
        # These are commented out to avoid conflicting with 05-add-comments.yaml example
      # - name: Find comment for image tags
      #   uses: peter-evans/find-comment@v4
      #   if: github.event_name == 'pull_request'
      #   id: fc
      #   with:
      #     issue-number: ${{ github.event.pull_request.number }}
      #     comment-author: 'github-actions[bot]'
      #     body-includes: Docker image tag(s) pushed
      
      #   # If PR, put image tags in the PR comments
      # - name: Create or update comment for image tags
      #   uses: peter-evans/create-or-update-comment@v4
      #   if: github.event_name == 'pull_request'
      #   with:
      #     comment-id: ${{ steps.fc.outputs.comment-id }}
