---
name: 04 Build with Metadata

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-image:
    name: Build Image
    runs-on: ubuntu-latest
    steps:
      - name: Set up QEMU # Build images to support multi-platforms
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx # Extend image building capabilities
        uses: docker/setup-buildx-action@v4 

      - name: Login to Docker Hub # Login to DockerHub
        uses: docker/login-action@v4 
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

#NEW: (START) ##########################################################
      - name: Docker meta
        id: docker_meta
        uses: docker/metadata-action@v6 
        with:
          images: danny0908/docker-ci # sets the base image name
          flavor: |
            latest=false  
          # disable automatic latest tagging
          tags: |
            type=raw,value=04
            type=raw,value=latest,enable=${{ endsWith(github.ref, github.event.repository.default_branch) }}
            type=ref,event=pr
            type=ref,event=branch
            type=semver,pattern={{version}}
          # raw, ref, and semver are three different tag‑generation strategies used by docker/metadata-action. 
          # They tell the action where to get the tag value from: a literal string, a Git reference, or a semantic version. 
#NEW: (END) ############################################################
      
      - name: Docker build # Build Image
        uses: docker/build-push-action@v7
        with:
#NEW: (START) ##########################################################
          push: true # Push on all builds
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
#NEW: (END) ############################################################
          cache-from: type=gha # import previously saved layers from GitHub Actions cache
          cache-to: type=gha,mode=max # export new/updated layers back to GitHub Actions cache
          # type=gha selects the GitHub Actions cache backend
          # mode=max exports all intermediate layers, not just the minimal set.
          
          platforms: linux/amd64,linux/arm64,linux/arm/v7 # Add support for AMD/Intel/ARM for linux. For windows containers: windows/amd64
